<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BankDash</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <!-- LOGO -->
            <div class="logo">

                <img src="assets/images/logo.svg" alt="" class="logo-icon">

                <h2>BankDash.</h2>

            </div>

            <!-- MENU -->
            <nav class="menu">

                <button class="menu-item">
                    <img src="assets/icons/dashboard.svg" alt="">
                    Dashboard
                </button>

                <button class="menu-item">
                    <img src="assets/icons/transaction.svg" alt="">
                    Transactions
                </button>

                <button class="menu-item">
                    <img src="assets/icons/account.svg" alt="">
                    Accounts
                </button>

                <button class="menu-item">
                    <img src="assets/icons/investment.svg" alt="">
                    Investments
                </button>

                <button class="menu-item active" onclick="showPage('credit', this)" data-page="credit"
                    data-icon="assets/icons/credit-card.svg" data-active-icon="assets/icons/credit-card-active.svg">
                    <img src="assets/icons/credit-card-active.svg" alt="">
                    Credit Cards
                </button>

                <button class="menu-item">
                    <img src="assets/icons/loan.svg" alt="">
                    Loans
                </button>

                <button class="menu-item" onclick="showPage('services', this)" data-page="services"
                    data-icon="assets/icons/service.svg" data-active-icon="assets/icons/service-active.svg">
                    <img src="assets/icons/service.svg" alt="">
                    Services
                </button>

                <button class="menu-item">
                    <img src="assets/icons/my-privilege.svg" alt="">
                    My Privileges
                </button>

                <button class="menu-item" onclick="showPage('setting', this)" data-page="setting"
                    data-icon="assets/icons/setting.svg" data-active-icon="assets/icons/setting-active.svg">
                    <img src="assets/icons/setting.svg" alt="">
                    Setting
                </button>

            </nav>

        </aside>

        <!-- MAIN CONTENT -->
        <main class="content">

            <!-- TOPBAR -->
            <div class="topbar">

                <button class="hamburger-btn" type="button" onclick="toggleMobileMenu()">
                    ☰
                </button>

                <h1 id="page-title">Credit Cards</h1>

                <div class="topbar-right">

                    <!-- SEARCH -->
                    <div class="search-box">

                        <img src="assets/icons/search.svg" alt="">

                        <input type="text" placeholder="Search for something">

                    </div>

                    <!-- SETTINGS -->
                    <div class="top-icon">

                        <img src="assets/icons/setting-topbar.svg" alt="">

                    </div>

                    <!-- NOTIFICATION -->
                    <div class="top-icon">

                        <img src="assets/icons/notification.svg" alt="">

                    </div>

                    <!-- PROFILE -->
                    <img src="assets/images/profile.png" alt="" class="profile-img">

                </div>
            </div>

            <nav class="mobile-menu" id="mobileMenu">

                <button class="menu-item">
                    <img src="assets/icons/dashboard.svg" alt="">
                    Dashboard
                </button>

                <button class="menu-item">
                    <img src="assets/icons/transaction.svg" alt="">
                    Transactions
                </button>

                <button class="menu-item">
                    <img src="assets/icons/account.svg" alt="">
                    Accounts
                </button>

                <button class="menu-item">
                    <img src="assets/icons/investment.svg" alt="">
                    Investments
                </button>

                <button class="menu-item active" onclick="showPage('credit', this)" data-page="credit"
                    data-icon="assets/icons/credit-card.svg" data-active-icon="assets/icons/credit-card-active.svg">
                    <img src="assets/icons/credit-card-active.svg" alt="">
                    Credit Cards
                </button>

                <button class="menu-item">
                    <img src="assets/icons/loan.svg" alt="">
                    Loans
                </button>

                <button class="menu-item" onclick="showPage('services', this)" data-page="services"
                    data-icon="assets/icons/service.svg" data-active-icon="assets/icons/service-active.svg">
                    <img src="assets/icons/service.svg" alt="">
                    Services
                </button>

                <button class="menu-item">
                    <img src="assets/icons/my-privilege.svg" alt="">
                    My Privileges
                </button>

                <button class="menu-item" onclick="showPage('setting', this)" data-page="setting"
                    data-icon="assets/icons/setting.svg" data-active-icon="assets/icons/setting-active.svg">
                    <img src="assets/icons/setting.svg" alt="">
                    Setting
                </button>

            </nav>

            <div id="page-container"></div>

        </main>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="script.js"></script>

</body>

</html>
